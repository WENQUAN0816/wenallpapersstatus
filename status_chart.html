<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>论文状态统计</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #1f2937;
      background: #f8fafc;
    }

    main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 28px 28px 36px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 20px;
      color: #4b5563;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
    }

    .panel {
      min-height: 430px;
      padding: 14px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 10px;
      margin: 0 0 18px;
    }

    .stat {
      border: 1px solid #e5e7eb;
      border-left: 8px solid var(--color);
      border-radius: 8px;
      padding: 10px 12px;
      background: #ffffff;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.2;
    }

    .stat span {
      display: block;
      margin-top: 4px;
      color: #4b5563;
      font-size: 13px;
      line-height: 1.35;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>论文状态统计</h1>
    <p>按 README 当前状态表统计，共 61 篇/项；待投稿包含所有未处于投稿流程中的论文。已接收论文不再纳入统计。</p>

    <section class="summary" id="summary"></section>
    <section class="grid">
      <div class="panel" id="pie"></div>
    </section>
  </main>

  <script>
    const labels = [
      "待投稿",
      "需修订",
      "内审中",
      "外审中"
    ];

    const values = [12, 1, 44, 4];
    const colors = [
      "#64748b",
      "#f43f5e",
      "#f59e0b",
      "#22c55e"
    ];
    const markerLines = [
      "#9ca3af",
      "#ec4899",
      "#eab308",
      "#22c55e"
    ];

    const total = values.reduce((sum, value) => sum + value, 0);
    const summary = document.getElementById("summary");
    labels.forEach((label, index) => {
      const item = document.createElement("div");
      item.className = "stat";
      item.style.setProperty("--color", markerLines[index]);
      item.innerHTML = `<strong>${values[index]}</strong><span>${label}</span>`;
      summary.appendChild(item);
    });

    Plotly.newPlot("pie", [{
      type: "pie",
      labels,
      values,
      hole: 0.35,
      marker: { colors, line: { color: "#ffffff", width: 2 } },
      textinfo: "label+value",
      hovertemplate: "%{label}<br>数量：%{value}<extra></extra>"
    }], {
      title: { text: "论文状态统计饼图", x: 0, xanchor: "left" },
      annotations: [{
        text: `总计<br><b>${total}</b>`,
        showarrow: false,
        font: { size: 18, color: "#111827" }
      }],
      margin: { l: 18, r: 18, t: 54, b: 18 },
      paper_bgcolor: "#ffffff",
      plot_bgcolor: "#ffffff",
      font: { family: "Arial, Microsoft YaHei, sans-serif", color: "#1f2937" },
      showlegend: true,
      legend: { orientation: "h", x: 0.5, xanchor: "center", y: -0.04 }
    }, { responsive: true, displaylogo: false });
  </script>
</body>
</html>
