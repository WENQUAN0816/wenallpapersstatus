name: Status table order

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Stage journal databases from repo
        shell: bash
        run: |
          mkdir -p "$HOME/EIlist" "$HOME/ssci-top100-journals"
          cp journals/cas2025.csv "$HOME/cas2025.csv"
          cp journals/xr2026.csv "$HOME/xr2026.csv"
          cp journals/ssci_top100.csv "$HOME/ssci_top100.csv"
          cp journals/ei_journals_raw.csv "$HOME/EIlist/ei_journals_raw.csv"
          # sscitop100.csv is optional (PS1 tolerates absence)
          if [ -f journals/sscitop100.csv ]; then
            cp journals/sscitop100.csv "$HOME/ssci-top100-journals/sscitop100.csv"
          fi
          echo "JOURNAL_DB_READY=1" >> "$GITHUB_ENV"

      - name: Normalize status table
        if: env.JOURNAL_DB_READY == '1'
        shell: pwsh
        run: ./scripts/Update-PaperStatus.ps1

      - name: Commit normalized files
        if: env.JOURNAL_DB_READY == '1'
        shell: bash
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md index.html status_data.json row_overrides.json situation_overrides.json submission_system_overrides.json status_bar_chart.svg status_chart.html scripts/Update-PaperStatus.ps1 scripts/build_status_page.py
            git commit -m "Normalize status table order"
            git push
          fi
