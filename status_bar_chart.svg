    <rect x="356" y="90" width="70" height="228" rx="4" fill="#fff8d9" stroke="#eab308"/>
    <text x="391" y="82" fill="#111827">38</text>

    <rect x="486" y="282" width="70" height="36" rx="4" fill="#e8f1ff" stroke="#3b82f6"/>
    <text x="521" y="274" fill="#111827">6</text>

    <rect x="616" y="276" width="70" height="42" rx="4" fill="#e8f9ee" stroke="#22c55e"/>
    <text x="651" y="268" fill="#111827">7</text>
  </g>

  <g font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#374151" text-anchor="middle">
    <text x="131" y="346">待投稿</text>
    <text x="261" y="346">需修订</text>
    <text x="391" y="346">待初审</text>
