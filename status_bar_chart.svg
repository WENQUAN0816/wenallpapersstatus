<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
  <title id="title">论文状态统计柱状图</title>
  <desc id="desc">待投稿16，需修订1，待初审38，初审中6，外审中7。</desc>
  <rect width="760" height="430" fill="#ffffff"/>
  <text x="30" y="34" fill="#111827" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">论文状态统计</text>
  <text x="30" y="58" fill="#6b7280" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">共 68 篇/项；已接收论文不纳入统计</text>

  <g font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" fill="#6b7280">
    <line x1="64" y1="318" x2="720" y2="318" stroke="#d1d5db" stroke-width="1"/>
    <line x1="64" y1="258" x2="720" y2="258" stroke="#e5e7eb" stroke-width="1"/>
    <line x1="64" y1="198" x2="720" y2="198" stroke="#e5e7eb" stroke-width="1"/>
    <line x1="64" y1="138" x2="720" y2="138" stroke="#e5e7eb" stroke-width="1"/>
    <line x1="64" y1="78" x2="720" y2="78" stroke="#e5e7eb" stroke-width="1"/>
    <text x="42" y="322" text-anchor="end">0</text>
    <text x="42" y="262" text-anchor="end">10</text>
    <text x="42" y="202" text-anchor="end">20</text>
    <text x="42" y="142" text-anchor="end">30</text>
    <text x="42" y="82" text-anchor="end">40</text>
  </g>

  <g font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" text-anchor="middle">
    <rect x="96" y="222" width="70" height="96" rx="4" fill="#f2f2f2" stroke="#9ca3af"/>
    <text x="131" y="214" fill="#111827">16</text>

    <rect x="226" y="312" width="70" height="6" rx="4" fill="#ffd9ec" stroke="#ec4899"/>
